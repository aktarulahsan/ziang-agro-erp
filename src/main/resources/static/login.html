<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Login | Agro ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
</head>
<body class="login-body">
<main class="login-page">
  <section class="login-card">
    <div class="login-brand">
      <i class="bi bi-flower1"></i>
      <div>
        <h1>Agro ERP</h1>
        <p>Company business login</p>
      </div>
    </div>
    <div class="mb-3">
      <label class="form-label">Username</label>
      <input class="form-control" id="username" value="admin" autocomplete="username">
    </div>
    <div class="mb-3">
      <label class="form-label">Password</label>
      <input type="password" class="form-control" id="password" value="admin123" autocomplete="current-password">
    </div>
    <button class="btn btn-success w-100" id="loginBtn"><i class="bi bi-shield-lock"></i> Login</button>
    <div class="small mt-3 text-muted" id="loginMessage">Default: admin / admin123</div>
  </section>
</main>
<script src="/js/app.js"></script>
<script>
  if (token()) window.location.href = '/index.html';
  document.getElementById('loginBtn').addEventListener('click', login);
  document.getElementById('password').addEventListener('keydown', event => {
    if (event.key === 'Enter') login();
  });
</script>
</body>
</html>
