<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8"><meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Movement History | Agro ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<div class="app-shell"><aside class="sidebar"><div class="brand"><i class="bi bi-flower1"></i><span>Agro ERP</span></div><nav><a href="/index.html"><i class="bi bi-speedometer2"></i>Dashboard</a><a href="/pages/retailer/index.html"><i class="bi bi-shop"></i>Retailer</a><a href="/pages/products.html"><i class="bi bi-box-seam"></i>Products</a><a class="active" href="/pages/material/index.html"><i class="bi bi-boxes"></i>Material</a><a href="/pages/accounts.html"><i class="bi bi-journal-text"></i>Accounts</a></nav></aside>
<main class="content">
  <header class="topbar topbar-compact"><div><h1>Movement History</h1><p>Material document display by movement type</p></div><button class="btn btn-success" onclick="refreshMovementHistory()"><i class="bi bi-arrow-clockwise"></i> Refresh</button></header>
  <nav class="module-nav"><a href="/pages/material/list.html">Material List</a><a href="/pages/material/create.html">Create Material</a><a href="/pages/material/stock.html">Stock View</a><a href="/pages/material/stock-posting.html">Stock Posting</a><a href="/pages/material/movements.html" class="active">Movement History</a><a href="/pages/material/price-posting.html">Price Posting</a><a href="/pages/material/price-history.html">Price History</a></nav>
  <section class="panel">
    <div class="panel-header">
      <h2>Goods Movement Log</h2>
      <div class="d-flex gap-2">
        <select id="movementProductId" class="form-select form-select-sm" onchange="refreshMovementHistory()"></select>
        <select id="movementTypeFilter" class="form-select form-select-sm" onchange="refreshMovementHistory()"></select>
      </div>
    </div>
    <div class="table-panel">
      <table class="table align-middle">
        <thead><tr><th>Date</th><th>Code</th><th>Material</th><th>Warehouse</th><th>MvT</th><th>Movement</th><th class="text-end">Qty</th><th>Batch</th><th>Reference</th><th>Remarks</th><th class="text-end">Action</th></tr></thead>
        <tbody id="movementRows"></tbody>
      </table>
    </div>
  </section>
</main></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script><script src="/js/app.js"></script><script src="/js/material-module.js"></script><script>requireAuth();initMovementHistory();</script>
</body></html>
