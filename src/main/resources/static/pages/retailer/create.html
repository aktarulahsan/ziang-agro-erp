<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Create Retailer | Agro ERP</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link href="/css/app.css" rel="stylesheet">
</head>
<body>
<div class="app-shell">
  <aside class="sidebar"><div class="brand"><i class="bi bi-flower1"></i><span>Agro ERP</span></div><nav><a href="/index.html"><i class="bi bi-speedometer2"></i>Dashboard</a><a class="active" href="/pages/retailer/index.html"><i class="bi bi-shop"></i>Retailer</a><a href="/pages/products.html"><i class="bi bi-box-seam"></i>Products</a><a href="/pages/material/index.html"><i class="bi bi-boxes"></i>Material</a><a href="/pages/accounts.html"><i class="bi bi-journal-text"></i>Accounts</a></nav></aside>
  <main class="content">
    <header class="topbar topbar-compact"><div><h1 id="retailerFormTitle">Create Retailer</h1><p>Business partner master data, territory, credit, contact and opening balance</p></div><a class="btn btn-outline-secondary" href="/pages/retailer/list.html"><i class="bi bi-list-ul"></i> List</a></header>
    <nav class="module-nav"><a href="/pages/retailer/list.html">Retailer List</a><a href="/pages/retailer/create.html" class="active">Create Retailer</a><a href="/pages/retailer/ledger.html">Retailer Journal</a><a href="/pages/orders/create.html">Create Order</a><a href="/pages/invoices/create.html">Collection</a></nav>
    <section class="panel">
      <div class="panel-header"><h2>General and Credit Data</h2><button class="btn btn-sm btn-outline-secondary" onclick="clearRetailerMasterForm()"><i class="bi bi-x-circle"></i> Clear</button></div>
      <div class="row g-3">
        <div class="col-md-3"><label class="form-label">Retailer Code</label><div class="input-group"><input id="retailerCode" class="form-control" readonly><button class="btn btn-outline-secondary" type="button" title="Generate code" onclick="generateRetailerCode()"><i class="bi bi-arrow-clockwise"></i></button></div></div>
        <div class="col-md-5"><label class="form-label">Retailer Name</label><input id="retailerName" class="form-control"></div>
        <div class="col-md-4"><label class="form-label">Owner / Contact Person</label><input id="ownerName" class="form-control"></div>
        <div class="col-md-3"><label class="form-label">Mobile Number</label><input id="mobileNumber" class="form-control"></div>
        <div class="col-md-3"><label class="form-label">Email</label><input id="email" type="email" class="form-control"></div>
        <div class="col-md-3"><label class="form-label">Territory</label><select id="territoryId" data-territory-select class="form-select"></select></div>
        <div class="col-md-3"><label class="form-label">Market</label><input id="marketName" class="form-control"></div>
        <div class="col-md-3"><label class="form-label">Credit Limit</label><input id="creditLimit" type="number" class="form-control" value="0"></div>
        <div class="col-md-3"><label class="form-label">Opening Balance</label><input id="openingBalance" type="number" class="form-control" value="0"></div>
        <div class="col-md-3"><label class="form-label">Current Due</label><input id="currentDueBalance" class="form-control" value="0.00" readonly></div>
        <div class="col-12"><label class="form-label">Address</label><input id="address" class="form-control" placeholder="Shop, market, union, upazila, district"></div>
        <div class="col-12"><button class="btn btn-success" onclick="saveRetailerMaster()"><i class="bi bi-save"></i> <span id="retailerSaveText">Save Retailer</span></button></div>
      </div>
      <div id="retailerMessage" class="small mt-2"></div>
    </section>
  </main>
</div>
<script src="/js/app.js"></script>
<script src="/js/retailer-module.js"></script>
<script>requireAuth();initRetailerCreate();</script>
</body>
</html>
